<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gimnasio Musical - 2º EEBB</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bravura-text-font@1.0.3/bravura-text.css">
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --dark: #2c3e50;
            --light: #f8f9fa;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            color: var(--dark);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 5px;
            font-size: 2rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        @media(min-width: 600px) {
            body {
                padding: 20px;
            }

            h1 {
                font-size: 2.5rem;
            }
        }

        .subtitle {
            font-size: 1rem;
            color: #64748b;
            margin-top: 0;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        @media(min-width: 600px) {
            .container {
                padding: 30px;
            }
        }

        /* Menú Principal Responsivo */
        .menu {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media(min-width: 550px) {
            .menu {
                grid-template-columns: 1fr 1fr;
            }

            .full-width {
                grid-column: span 2;
            }
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            filter: brightness(1.05);
        }

        button.btn-back {
            background-color: #94a3b8;
            margin-top: 25px;
            padding: 10px 20px;
            font-size: 0.9rem;
            width: auto;
            display: inline-block;
        }

        /* Pantallas de Juego */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .score-board {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--primary);
            background: #f0f7ff;
            padding: 8px 15px;
            border-radius: 10px;
            display: inline-block;
        }

        /* Diseño Adaptable de Opciones mediante Auto-Fit */
        .options-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
            margin-top: 20px;
            width: 100%;
        }

        /* Ajuste específico para que las notas quepan en 4 columnas si hay espacio */
        .grid-notes {
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        }

        .option-btn {
            background-color: #f1f5f9;
            color: var(--dark);
            border: 2px solid #e2e8f0;
            padding: 12px;
            font-size: 1rem;
        }

        .option-btn:hover {
            background-color: #e2e8f0;
            color: var(--dark);
        }

        /* Mensajes de Feedback */
        .feedback {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 30px;
        }

        .correct {
            color: var(--success);
        }

        .incorrect {
            color: var(--danger);
        }

        /* Estilos del Pentagrama SVG Adaptable */
        .pentagram-container {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px;
            margin: 15px auto;
            max-width: 450px;
            width: 100%;
        }

        .rhythm-visual {
            font-family: 'Bravura Text', 'BravuraText', sans-serif;
            /* Aplica la fuente musical */
            font-size: 3rem;
            /* Al ser tipográfica puedes escalarla al tamaño que quieras */
            margin: 15px 0;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Pantalla de Carga */
        #loading-screen {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary);
            padding: 40px 0;
        }
    </style>
</head>

<body>

    <header>
        <h1>🎶 El Gimnasio Musical 🎶</h1>
        <p class="subtitle">Lenguaje Musical - 2º de Enseñanzas Básicas</p>
    </header>

    <div class="container">

        <div id="loading-screen">
            <p>Cargando lecciones musicales... 🎼</p>
        </div>

        <div id="screen-menu" class="screen">
            <p style="font-size: 1.1rem; margin-bottom: 25px;">¡Elige un desafío para empezar a entrenar tu oído y tu
                mente!</p>
            <div class="menu">
                <button onclick="startGame('notes')" style="background-color: #ff7675;">🎯 Atrapa la Nota (Clave de
                    Sol)</button>
                <button onclick="startGame('rhythm')" style="background-color: #2ecc71;">⏱️ El Reloj Rítmico</button>
                <button onclick="startGame('theory')" class="full-width" style="background-color: #9b59b6;">🧠 Sabio
                    Musical (Teoría y Matices)</button>
            </div>
        </div>

        <div id="screen-notes" class="screen">
            <div class="score-board">Aciertos: <span id="score-notes">0</span></div>
            <h3>¿Qué nota es esta?</h3>

            <div class="pentagram-container">
                <svg viewBox="0 0 300 180" width="100%" height="100%">
                    <line x1="20" y1="50" x2="280" y2="50" stroke="black" stroke-width="2" />
                    <line x1="20" y1="70" x2="280" y2="70" stroke="black" stroke-width="2" />
                    <line x1="20" y1="90" x2="280" y2="90" stroke="black" stroke-width="2" />
                    <line x1="20" y1="110" x2="280" y2="110" stroke="black" stroke-width="2" />
                    <line x1="20" y1="130" x2="280" y2="130" stroke="black" stroke-width="2" />

                    <text x="25" y="115" font-size="55" font-family="Arial">𝄞</text>

                    <line id="ledger-line" x1="130" y1="150" x2="170" y2="150" stroke="black" stroke-width="2"
                        display="none" />

                    <ellipse id="note-head" cx="150" cy="90" rx="12" ry="8" fill="black"
                        transform="rotate(-15 150 90)" />
                </svg>
            </div>

            <div class="options-container grid-notes" id="options-notes"></div>
            <div class="feedback" id="feedback-notes"></div>
            <button class="btn-back" onclick="goToMenu()">🔙 Volver al Menú</button>
        </div>

        <div id="screen-rhythm" class="screen">
            <div class="score-board">Aciertos: <span id="score-rhythm">0</span></div>
            <h3 id="question-rhythm">Pregunta rítmica</h3>

            <div class="rhythm-visual" id="visual-rhythm"></div>

            <div class="options-container" id="options-rhythm"></div>
            <div class="feedback" id="feedback-rhythm"></div>
            <button class="btn-back" onclick="goToMenu()">🔙 Volver al Menú</button>
        </div>

        <div id="screen-theory" class="screen">
            <div class="score-board">Aciertos: <span id="score-theory">0</span></div>
            <h3 id="question-theory">Pregunta de teoría</h3>

            <div class="options-container" id="options-theory"></div>
            <div class="feedback" id="feedback-theory"></div>
            <button class="btn-back" onclick="goToMenu()">🔙 Volver al Menú</button>
        </div>

    </div>

    <script>
        // --- CENTRALIZACIÓN DE BASES DE DATOS (Se rellenan con JSON) ---
        let masterData = {
            notes: [],
            rhythm: [],
            theory: []
        };

        // --- SISTEMA DE CONTROL DE REPETICIÓN (Pools de preguntas vivas) ---
        let questionPools = {
            notes: [],
            rhythm: [],
            theory: []
        };

        let scores = { notes: 0, rhythm: 0, theory: 0 };
        let currentItem = null;
        let canAnswer = true;

        // --- CARGAR DATOS DESDE LOS FICHEROS JSON ---
        async function loadAllData() {
            try {
                const [notesResponse, rhythmResponse, theoryResponse] = await Promise.all([
                    fetch('notas.json'),
                    fetch('ritmo.json'),
                    fetch('teoria.json')
                ]);

                if (!notesResponse.ok || !rhythmResponse.ok || !theoryResponse.ok) {
                    throw new Error("Uno o varios archivos JSON no pudieron cargarse.");
                }

                masterData.notes = await notesResponse.json();
                masterData.rhythm = await rhythmResponse.json();
                masterData.theory = await theoryResponse.json();

                // Ocultar pantalla de carga y mostrar menú
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('screen-menu').classList.add('active');

            } catch (error) {
                console.error("Error cargando la aplicación:", error);
                document.getElementById('loading-screen').innerHTML =
                    `<p style="color:var(--danger)">⚠️ Error al cargar los ficheros JSON.<br><small>Recuerda que debes ejecutar la app bajo un servidor local (HTTP) para permitir peticiones asíncronas.</small></p>`;
            }
        }

        // --- MANEJO DE NAVEGACIÓN ---
        function hideAllScreens() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.feedback').forEach(f => f.innerHTML = '');
        }

        function goToMenu() {
            hideAllScreens();
            document.getElementById('screen-menu').classList.add('active');
        }

        function startGame(gameType) {
            hideAllScreens();
            document.getElementById(`screen-${gameType}`).classList.add('active');
            canAnswer = true;
            nextQuestion(gameType);
        }

        // --- MOTOR DEL JUEGO CON LÓGICA DE NO-REPETICIÓN ---
        function nextQuestion(type) {
            canAnswer = true;
            document.getElementById(`feedback-${type}`).innerHTML = '';

            // Si la "piscina" de preguntas de este modo está vacía, la rellenamos clonando la base de datos maestra
            if (questionPools[type].length === 0) {
                questionPools[type] = [...masterData[type]];
            }

            // Seleccionamos un índice al azar de las preguntas que quedan disponibles
            const randomIndex = Math.floor(Math.random() * questionPools[type].length);

            // Extraemos (.splice) el elemento seleccionado para que se elimine de la piscina actual
            currentItem = questionPools[type].splice(randomIndex, 1)[0];

            if (type === 'notes') {
                const noteHead = document.getElementById('note-head');
                const ledgerLine = document.getElementById('ledger-line');

                noteHead.setAttribute('cy', currentItem.cy);
                noteHead.setAttribute('transform', `rotate(-15 150 ${currentItem.cy})`);

                if (currentItem.ledger) {
                    ledgerLine.style.display = 'block';
                } else {
                    ledgerLine.style.display = 'none';
                }

                const noteNames = ["DO", "RE", "MI", "FA", "SOL", "LA", "SI"];
                generateOptions('notes', noteNames, currentItem.name);

            } else if (type === 'rhythm') {
                document.getElementById('question-rhythm').innerText = currentItem.q;
                document.getElementById('visual-rhythm').innerText = currentItem.emoji;
                generateOptions('rhythm', currentItem.options, currentItem.correct);

            } else if (type === 'theory') {
                document.getElementById('question-theory').innerText = currentItem.q;
                generateOptions('theory', currentItem.options, currentItem.correct);
            }
        }

        function generateOptions(type, optionsArray, correctValue) {
            const container = document.getElementById(`options-${type}`);
            container.innerHTML = '';

            let finalOptions = [...optionsArray];
            // No mezclamos las notas del pentagrama para mantener el orden secuencial educativo Do-Re-Mi...
            if (type !== 'notes') {
                finalOptions.sort(() => Math.random() - 0.5);
            }

            finalOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(type, opt, correctValue, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(type, selected, correct, selectedBtn) {
            if (!canAnswer) return;
            canAnswer = false;

            const feedbackDiv = document.getElementById(`feedback-${type}`);

            if (selected === correct) {
                feedbackDiv.innerHTML = "<span class='correct'>¡Excelente! 🎉 ¡Correcto!</span>";
                scores[type]++;
                document.getElementById(`score-${type}`).innerText = scores[type];
                selectedBtn.style.backgroundColor = "var(--success)";
                selectedBtn.style.color = "white";
            } else {
                feedbackDiv.innerHTML = `<span class='incorrect'>¡Casi! Era la opción correcta: ${correct} 🤔</span>`;
                selectedBtn.style.backgroundColor = "var(--danger)";
                selectedBtn.style.color = "white";
            }

            // Transición automática suave en 2 segundos hacia la siguiente pregunta
            setTimeout(() => {
                nextQuestion(type);
            }, 2000);
        }

        // Ejecutar carga al iniciar la ventana
        window.onload = loadAllData;
    </script>
</body>

</html>
