<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sorteador 3D - Multiplataforma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

        :root {
            --indigo-primary: #6366f1;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            overflow: hidden;
            background: #050505;
            color: white;
            touch-action: manipulation;
            /* Optimiza toques en móvil */
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result-text {
            font-size: clamp(1.8rem, 8vw, 3.5rem);
            font-weight: 700;
            background: linear-gradient(to bottom, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            text-align: center;
            width: 90%;
            pointer-events: none;
        }

        .result-text.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Spinner para carga */
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--indigo-primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Ajustes específicos para móviles muy pequeños */
        @media (max-width: 400px) {
            .header-title {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div id="canvas-container"></div>

    <!-- UI Overlay principal -->
    <div class="fixed inset-0 pointer-events-none flex flex-col items-center justify-between p-4 md:p-8 z-10">

        <!-- Header Superior -->
        <div class="w-full flex justify-between items-start pointer-events-auto">
            <div class="glass-panel p-3 md:p-4 rounded-2xl">
                <h1 class="text-lg md:text-xl font-bold text-indigo-400 leading-none">SORTEO 3D</h1>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-1 header-title">IA-Responsive Engine
                </p>
            </div>

            <div class="flex gap-2">
                <button id="btn-ai-explain"
                    class="hidden glass-panel px-4 py-2 rounded-xl hover:bg-white/10 transition-colors pointer-events-auto flex items-center text-xs border-indigo-500/30 border shadow-lg">
                    ✨ Info
                </button>
                <button id="toggle-config"
                    class="glass-panel p-3 rounded-xl hover:bg-white/10 transition-colors pointer-events-auto shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Zona de Resultado Central -->
        <div class="flex flex-col items-center w-full px-4">
            <div id="result-display" class="result-text">TOCA PARA INICIAR</div>
            <div id="ai-info-box"
                class="hidden mt-4 glass-panel p-4 rounded-2xl w-full max-w-md text-xs md:text-sm text-gray-300 pointer-events-auto leading-relaxed border-indigo-500/20 border shadow-2xl">
                <!-- Respuesta Gemini -->
            </div>
        </div>

        <!-- Botón de Acción Inferior -->
        <div class="mb-8 md:mb-12 w-full flex justify-center">
            <button id="roll-button"
                class="pointer-events-auto bg-indigo-600 active:bg-indigo-700 text-white px-8 py-4 rounded-2xl font-bold shadow-2xl shadow-indigo-500/40 transform transition-all active:scale-90 uppercase tracking-tighter text-sm md:text-base w-full max-w-[280px]">
                Lanzar Sorteo
            </button>
        </div>
    </div>

    <!-- Panel de Configuración Lateral -->
    <div id="config-panel"
        class="fixed right-0 top-0 h-full w-full sm:w-80 glass-panel border-l border-white/10 z-20 translate-x-full transition-transform duration-300 p-6 flex flex-col pointer-events-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">Configuración ✨</h2>
            <button id="close-config" class="p-2 hover:bg-white/10 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <div class="mb-6 space-y-2">
            <label class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Generar Temática con IA</label>
            <div class="flex gap-2">
                <input id="ai-prompt" type="text" placeholder="Ej: Países de Europa"
                    class="bg-white/5 border border-white/10 rounded-xl px-3 py-3 text-sm w-full outline-none focus:border-indigo-500 transition-all">
                <button id="btn-ai-generate"
                    class="bg-indigo-600 px-4 py-2 rounded-xl text-lg font-bold hover:bg-indigo-500 transition-colors shrink-0">✨</button>
            </div>
        </div>

        <p class="text-[10px] text-gray-400 mb-2 uppercase tracking-widest font-bold">Opciones JSON:</p>
        <textarea id="json-editor"
            class="flex-grow bg-black/40 border border-white/10 rounded-xl p-4 text-xs font-mono text-indigo-200 outline-none focus:border-indigo-500 transition-colors mb-4 resize-none"></textarea>

        <button id="save-config"
            class="w-full bg-white text-black py-4 rounded-xl font-bold hover:bg-gray-200 transition-colors shadow-lg active:scale-95 transform">Actualizar
            Lista</button>
    </div>

    <script>
        const apiKey = "";
        let scene, camera, renderer, dice;
        let isRolling = false;
        let options = ["Pág 32 nº1", "Pág 32 nº2", "Pág 32 nº3", "Pág 32 nº4", "Pág 40 nº1", "Pág 40 nº2", "Pág 40 nº3", "Pág 40 nº4"];
        let availableOptions = [...options]; // Copia de la lista original

        const jsonEditor = document.getElementById('json-editor');
        const configPanel = document.getElementById('config-panel');
        const toggleBtn = document.getElementById('toggle-config');
        const closeConfigBtn = document.getElementById('close-config');
        const rollBtn = document.getElementById('roll-button');
        const resultDisplay = document.getElementById('result-display');
        const aiPromptInput = document.getElementById('ai-prompt');
        const aiGenerateBtn = document.getElementById('btn-ai-generate');
        const aiExplainBtn = document.getElementById('btn-ai-explain');
        const aiInfoBox = document.getElementById('ai-info-box');

        jsonEditor.value = JSON.stringify({ options }, null, 4);

        async function callGemini(prompt, systemInstruction = "", responseMimeType = "text/plain", responseSchema = null) {
            let retries = 0;
            const maxRetries = 5;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: systemInstruction ? { parts: [{ text: systemInstruction }] } : undefined,
                generationConfig: { responseMimeType, responseSchema }
            };

            while (retries < maxRetries) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) {
                    retries++;
                    await new Promise(res => setTimeout(res, Math.pow(2, retries) * 1000));
                }
            }
            throw new Error("Error de conexión");
        }

        async function generateOptionsWithAI() {
            const prompt = aiPromptInput.value.trim();
            if (!prompt) return;

            aiGenerateBtn.disabled = true;
            aiGenerateBtn.innerHTML = '<div class="spinner"></div>';

            try {
                const schema = {
                    type: "OBJECT",
                    properties: {
                        options: { type: "ARRAY", items: { type: "STRING" } }
                    },
                    required: ["options"]
                };

                const result = await callGemini(
                    `Genera 8 opciones de texto para el tema: ${prompt}`,
                    "Eres un generador de listas. Devuelve solo el JSON solicitado.",
                    "application/json",
                    schema
                );

                const data = JSON.parse(result);
                options = data.options;
                jsonEditor.value = JSON.stringify({ options }, null, 4);
                updateResultText("¡LISTA CREADA!");
                if (window.innerWidth < 640) configPanel.classList.add('translate-x-full');
            } catch (err) {
                alert("Error al generar lista.");
            } finally {
                aiGenerateBtn.disabled = false;
                aiGenerateBtn.innerText = "✨";
            }
        }

        async function explainWinner(winner) {
            aiInfoBox.classList.remove('hidden');
            aiInfoBox.innerHTML = '<div class="flex items-center gap-2"><div class="spinner"></div><span>La IA está analizando...</span></div>';

            try {
                const explanation = await callGemini(
                    `Dime algo interesante sobre: ${winner}`,
                    "Responde en español de forma educativa y breve (máximo 160 caracteres)."
                );
                aiInfoBox.innerText = explanation;
            } catch (err) {
                aiInfoBox.innerText = "Error al obtener info.";
            }
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Limita pixel ratio para performance
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const p1 = new THREE.PointLight(0x6366f1, 1.2); p1.position.set(10, 10, 10); scene.add(p1);
            const p2 = new THREE.PointLight(0xec4899, 1); p2.position.set(-10, -10, 10); scene.add(p2);

            const geometry = new THREE.OctahedronGeometry(1.8);
            const material = new THREE.MeshPhysicalMaterial({
                color: 0x0a0a0a, metalness: 0.8, roughness: 0.2, transparent: true, opacity: 0.85, clearcoat: 0.5
            });
            dice = new THREE.Mesh(geometry, material);
            const line = new THREE.LineSegments(new THREE.EdgesGeometry(geometry), new THREE.LineBasicMaterial({ color: 0x818cf8, transparent: true, opacity: 0.5 }));
            dice.add(line);
            scene.add(dice);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isRolling) {
                dice.rotation.y += 0.006;
                dice.rotation.z += 0.003;
            } else {
                dice.rotation.x += 0.35;
                dice.rotation.y += 0.4;
            }
            renderer.render(scene, camera);
        }

        function updateResultText(text) {
            resultDisplay.classList.remove('active');
            setTimeout(() => {
                resultDisplay.innerText = text;
                resultDisplay.classList.add('active');
            }, 100);
        }

        function roll() {
            if (isRolling) return;

            // 1. Verificar si quedan opciones
            if (availableOptions.length === 0) {
                updateResultText("¡TODOS SORTEADOS!");
                rollBtn.innerText = "REINICIAR LISTA";
                rollBtn.onclick = resetList; // Cambiamos temporalmente el evento
                return;
            }

            isRolling = true;
            resultDisplay.classList.remove('active');
            aiExplainBtn.classList.add('hidden');
            aiInfoBox.classList.add('hidden');
            rollBtn.disabled = true;
            rollBtn.classList.add('opacity-50');

            const duration = 1200 + Math.random() * 800;

            setTimeout(() => {
                isRolling = false;
                rollBtn.disabled = false;
                rollBtn.classList.remove('opacity-50');

                // 2. Seleccionar ganador de los DISPONIBLES
                const randomIndex = Math.floor(Math.random() * availableOptions.length);
                const winner = availableOptions[randomIndex];

                // 3. Eliminar el ganador de la lista de disponibles
                availableOptions.splice(randomIndex, 1);

                updateResultText(winner);

                // Mostrar cuántos quedan (opcional, para feedback del usuario)
                rollBtn.innerText = `Lanzar (${availableOptions.length} restantes)`;

                aiExplainBtn.classList.remove('hidden');
                dice.rotation.set(Math.random() * 6, Math.random() * 6, Math.random() * 6);
            }, duration);
        }

        // 4. Nueva función para reiniciar
        function resetList() {
            availableOptions = [...options];
            rollBtn.innerText = "Lanzar Sorteo";
            rollBtn.onclick = roll; // Restauramos el evento original
            updateResultText("LISTA REINICIADA");
        }

        // Listeners
        toggleBtn.onclick = () => configPanel.classList.remove('translate-x-full');
        closeConfigBtn.onclick = () => configPanel.classList.add('translate-x-full');
        rollBtn.onclick = roll;
        aiGenerateBtn.onclick = generateOptionsWithAI;
        aiExplainBtn.onclick = () => explainWinner(resultDisplay.innerText);

        document.getElementById('save-config').onclick = () => {
            try {
                const data = JSON.parse(jsonEditor.value);
                if (data.options) {
                    options = data.options;
                    availableOptions = [...options]; // <--- IMPORTANTE: Sincronizar aquí
                    rollBtn.innerText = "Lanzar Sorteo";
                    configPanel.classList.add('translate-x-full');
                    updateResultText("LISTA ACTUALIZADA");
                }
            } catch (e) { alert("JSON inválido"); }
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = init;
    </script>
</body>

</html>
